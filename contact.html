<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Rose Valley</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
    }

    header {
        background: #2c3e50;
        color: white;
        padding: 20px;
        text-align: center;
    }

    .container {
        max-width: 500px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #2c3e50;
    }

    input, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    textarea {
        resize: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #27ae60;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #219150;
    }

    .success {
        color: green;
        text-align: center;
        margin-top: 10px;
        display: none;
    }
</style>
</head>

<body>

<header>
    <h1>🌹 Rose Valley Contact</h1>
</header>

<div class="container">
    <h2>Get in Touch</h2>

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" rows="5" placeholder="Your Message"></textarea>

    <button onclick="submitForm()">Send Message</button>

    <p class="success" id="successMsg">Message sent successfully 🌹</p>
</div>

<script>
    function submitForm() {
        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let message = document.getElementById("message").value.trim();

        if(name === "" || email === "" || message === "") {
            alert("⚠️ Please fill all fields");
            return;
        }

        // Simple email check
        if(!email.includes("@")) {
            alert("⚠️ Enter a valid email");
            return;
        }

        document.getElementById("successMsg").style.display = "block";

        // Clear fields
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("message").value = "";
    }
</script>

</body>
</html>
